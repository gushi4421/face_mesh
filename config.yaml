logging:
    level: "INFO"
    path: "records.log"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    encoding: "utf-8"

gui:
    window_title: "Face Mesh Pro - Ultimate Refactored"
    window_width: 1100
    window_height: 800
    initial_text: "请点击“开始检测”开启摄像头"
    bg_image_path: ""
    bg_opacity: 0.6

face-mesh:
    model_path: "models/face_landmarker.task"
    initial_max_faces: 2
    draw_mode: "mesh"      # "mesh" 或 "points"
    draw_on_left: true

beauty:
    initial_saturation: 1.0
    initial_sharpness: 0.0
    initial_smoothing: 0
    initial_brighten: 1.0